name: WordPress Vulnerability Scan

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Scan the original vulnerable image ────────────────────────────
  wpscan-vulnerable:
    runs-on: ubuntu-latest
    name: Scan Vulnerable Image

    services:
      db:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: wordpress
          MYSQL_USER: wpuser
          MYSQL_PASSWORD: wppassword
        options: >-
          --health-cmd "mysqladmin ping --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      wordpress:
        image: wordpress:6.4.1-php8.1-apache
        env:
          WORDPRESS_DB_HOST: db:3306
          WORDPRESS_DB_USER: wpuser
          WORDPRESS_DB_PASSWORD: wppassword
          WORDPRESS_DB_NAME: wordpress
        ports:
          - 8080:80
        options: >-
          --health-cmd "curl -f http://localhost:80 || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for WordPress and auto-configure
        run: |
          echo "Waiting for WordPress to start..."
          for i in {1..20}; do
            if curl -s http://localhost:8080 | grep -qE "WordPress|install"; then
              echo "WordPress is responding!"
              break
            fi
            echo "Attempt $i: waiting 10s..."
            sleep 10
          done

          echo "Installing WP-CLI inside WordPress container..."
          docker exec $(docker ps -qf "ancestor=wordpress:6.4.1-php8.1-apache") bash -c "
            curl -o /usr/local/bin/wp https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar &&
            chmod +x /usr/local/bin/wp
          "

          echo "Running WordPress install via WP-CLI..."
          docker exec $(docker ps -qf "ancestor=wordpress:6.4.1-php8.1-apache") bash -c "
            wp core install \
              --url=http://localhost:8080 \
              --title='DevSecOps Lab' \
              --admin_user=admin \
              --admin_password=admin123 \
              --admin_email=admin@example.com \
              --path=/var/www/html \
              --allow-root
          "

          echo "Verifying..."
          curl -s http://localhost:8080 | grep -q "DevSecOps" && echo "WordPress ready!" || echo "Still not configured"

      - name: Create scans directory
        run: mkdir -p ${{ github.workspace }}/scans

      - name: Run WPScan on hardened image
                    run: |
                      docker run --rm \
                        --network host \
                        --user root \
                        -v ${{ github.workspace }}/scans:/scans \
                        wpscanteam/wpscan \
                        --url http://localhost:8081 \
                        --enumerate vp,vt,u \
                        --plugins-detection aggressive \
                        --api-token ${{ secrets.WPSCAN_API_TOKEN }} \
                        --random-user-agent \
                        --force \
                        --format json \
                        --output /scans/wpscan-hardened.json \
                        || true

      - name: Summary - Vulnerable image
        run: |
          echo "=== VULNERABLE IMAGE - Vulnerabilities Found ==="
          cat ${{ github.workspace }}/scans/wpscan-vulnerable.json \
            | grep -o '"title":[^,]*' \
            | sed 's/"title"://g' \
            | tr -d '"' \
            || echo "Could not parse vulnerabilities"

      - name: Upload vulnerable scan artifact
        uses: actions/upload-artifact@v4
        with:
          name: wpscan-vulnerable-${{ github.run_number }}
          path: ${{ github.workspace }}/scans/wpscan-vulnerable.json
          if-no-files-found: warn
          retention-days: 30

  # ── Job 2: Scan the hardened image ──────────────────────────────────────
  wpscan-hardened:
    runs-on: ubuntu-latest
    name: Scan Hardened Image
    needs: wpscan-vulnerable

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull hardened image
        run: docker pull ghcr.io/${{ github.repository_owner }}/hardened-wordpress:latest

      - name: Start database
        run: |
          docker network create wpnet

          docker run -d \
            --name db \
            --network wpnet \
            -e MYSQL_ROOT_PASSWORD=rootpassword \
            -e MYSQL_DATABASE=wordpress \
            -e MYSQL_USER=wpuser \
            -e MYSQL_PASSWORD=wppassword \
            mysql:5.7

          echo "Waiting for MySQL to be ready..."
          for i in {1..20}; do
            if docker exec db mysqladmin ping --silent 2>/dev/null; then
              echo "MySQL is ready!"
              break
            fi
            echo "Attempt $i: MySQL not ready yet..."
            sleep 10
          done

      - name: Start hardened WordPress container
        run: |
          docker run -d \
            --name hardened-wp \
            --network wpnet \
            -p 8081:80 \
            -e WORDPRESS_DB_HOST=db:3306 \
            -e WORDPRESS_DB_USER=wpuser \
            -e WORDPRESS_DB_PASSWORD=wppassword \
            -e WORDPRESS_DB_NAME=wordpress \
            ghcr.io/${{ github.repository_owner }}/hardened-wordpress:latest

          echo "Waiting for hardened WordPress..."
          for i in {1..30}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP status = $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "301" ]; then
              echo "Hardened WordPress is up!"
              break
            fi
            sleep 10
          done

          echo "Final status check:"
          curl -v http://localhost:8081 2>&1 | head -30

      - name: Configure hardened WordPress via WP-CLI
        run: |
          docker exec hardened-wp bash -c "
            wp core install \
              --url=http://localhost:8081 \
              --title='DevSecOps Hardened' \
              --admin_user=admin \
              --admin_password=admin123 \
              --admin_email=admin@example.com \
              --path=/var/www/html \
              --allow-root
          " || echo "WP-CLI install failed or already done"

          echo "Waiting after WP-CLI install..."
          sleep 15

          echo "Post-install status:"
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" http://localhost:8081

      - name: Create scans directory
        run: mkdir -p ${{ github.workspace }}/scans

      - name: Run WPScan on hardened image
        run: |
          docker run --rm \
            --network host \
            --user root \
            -v ${{ github.workspace }}/scans:/scans \
            wpscanteam/wpscan \
            --url http://localhost:8081 \
            --enumerate vp,vt,u \
            --plugins-detection aggressive \
            --api-token ${{ secrets.WPSCAN_API_TOKEN }} \
            --random-user-agent \
            --ignore-main-redirect \
            --format json \
            --output /scans/wpscan-hardened.json \
            || true

      - name: Summary - Hardened image
        run: |
          echo "=== HARDENED IMAGE - Vulnerabilities Found ==="
          cat ${{ github.workspace }}/scans/wpscan-hardened.json \
            | grep -o '"title":[^,]*' \
            | sed 's/"title"://g' \
            | tr -d '"' \
            || echo "Could not parse vulnerabilities"

      - name: Upload hardened scan artifact
        uses: actions/upload-artifact@v4
        with:
          name: wpscan-hardened-${{ github.run_number }}
          path: ${{ github.workspace }}/scans/wpscan-hardened.json
          if-no-files-found: warn
          retention-days: 30
