name: WordPress Vulnerability Scan

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  wpscan:
    runs-on: ubuntu-latest

    services:
      db:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: wordpress
          MYSQL_USER: wpuser
          MYSQL_PASSWORD: wppassword
        options: >-
          --health-cmd "mysqladmin ping --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      wordpress:
        image: wordpress:6.4.1-php8.1-apache
        env:
          WORDPRESS_DB_HOST: db:3306
          WORDPRESS_DB_USER: wpuser
          WORDPRESS_DB_PASSWORD: wppassword
          WORDPRESS_DB_NAME: wordpress
        ports:
          - 8080:80
        options: >-
          --health-cmd "curl -f http://localhost:80 || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for WordPress and auto-configure
        run: |
          echo "Waiting for WordPress to start..."
          for i in {1..20}; do
            if curl -s http://localhost:8080 | grep -qE "WordPress|install"; then
              echo "WordPress is responding!"
              break
            fi
            echo "Attempt $i: waiting 10s..."
            sleep 10
          done

          echo "Installing WP-CLI inside WordPress container..."
          docker exec $(docker ps -qf "ancestor=wordpress:6.4.1-php8.1-apache") bash -c "
            curl -o /usr/local/bin/wp https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar &&
            chmod +x /usr/local/bin/wp
          "

          echo "Running WordPress install via WP-CLI..."
          docker exec $(docker ps -qf "ancestor=wordpress:6.4.1-php8.1-apache") bash -c "
            wp core install \
              --url=http://localhost:8080 \
              --title='DevSecOps Lab' \
              --admin_user=admin \
              --admin_password=admin123 \
              --admin_email=admin@example.com \
              --path=/var/www/html \
              --allow-root
          "

          echo "Verifying..."
          curl -s http://localhost:8080 | grep -q "DevSecOps" && echo "WordPress ready!" || echo "Still not configured"

      - name: Create scans directory
        run: mkdir -p ${{ github.workspace }}/scans

      - name: Run WPScan
        run: |
          docker run --rm \
            --network host \
            --user root \
            -v ${{ github.workspace }}/scans:/scans \
            wpscanteam/wpscan \
            --url http://localhost:8080 \
            --enumerate vp,vt,u \
            --plugins-detection aggressive \
            --api-token ${{ secrets.WPSCAN_API_TOKEN }} \
            --format json \
            --output /scans/wpscan-latest.json \
            || true

      - name: Verify scan output exists
        run: |
          echo "=== Files in scans/ ==="
          ls -lh ${{ github.workspace }}/scans/
          echo "=== WPScan Summary ==="
          cat ${{ github.workspace }}/scans/wpscan-latest.json | grep -o '"title":[^,]*' | sed 's/"title"://g' | tr -d '"' || echo "No titles found"

      - name: Upload scan results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wpscan-results-${{ github.run_number }}
          path: ${{ github.workspace }}/scans/wpscan-latest.json
          if-no-files-found: warn
          retention-days: 30
